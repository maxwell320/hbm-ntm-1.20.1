name: Build

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HOME: ${{ github.workspace }}/.ci-home
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI home
        run: mkdir -p "$HOME/.m2"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Configure Gradle toolchain
        run: |
          mkdir -p "$GRADLE_USER_HOME"
          printf '%s\n' \
            'org.gradle.java.installations.auto-detect=false' \
            'org.gradle.java.installations.auto-download=false' \
            'org.gradle.java.installations.fromenv=JAVA_HOME' \
            > "$GRADLE_USER_HOME/gradle.properties"

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Debug Java and Gradle environment
        if: failure()
        run: |
          echo "HOME=$HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          env | sort | grep -E 'JAVA|GRADLE|MAVEN|TOOL' || true
          echo "--- GRADLE_USER_HOME/gradle.properties ---"
          cat "$GRADLE_USER_HOME/gradle.properties" 2>/dev/null || echo "(not found)"
          echo "--- toolchains.xml ---"
          find "$HOME" -maxdepth 4 -name toolchains.xml -print -exec cat {} \; || true
