name: Build

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HOME: ${{ github.workspace }}/.ci-home
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI home
        run: mkdir -p "$HOME/.m2"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Debug pre-build environment
        run: |
          echo "--- Environment ---"
          echo "HOME=$HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "GRADLE_HOME=${GRADLE_HOME:-<unset>}"
          echo "GRADLE_USER_HOME=$GRADLE_USER_HOME"
          echo "--- Searching for ALL gradle.properties files ---"
          find / -name "gradle.properties" -readable 2>/dev/null || true
          echo "--- System Gradle init scripts ---"
          find /usr/share/gradle*/init.d/ -type f 2>/dev/null || echo "(none)"
          echo "--- GRADLE_USER_HOME contents ---"
          find "$GRADLE_USER_HOME" -type f 2>/dev/null || echo "(empty)"
          echo "--- Searching for Windows path in any readable file ---"
          grep -rl "Eclipse Adoptium" /home/runner/ 2>/dev/null || echo "(not found)"

      - name: Build
        run: |
          unset GRADLE_HOME
          ./gradlew build --no-daemon \
            -Dorg.gradle.java.installations.auto-detect=false \
            -Dorg.gradle.java.installations.auto-download=false \
            -Dorg.gradle.java.installations.paths="$JAVA_HOME"

      - name: Debug Java and Gradle environment
        if: failure()
        run: |
          echo "HOME=$HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          env | sort | grep -E 'JAVA|GRADLE|MAVEN|TOOL' || true
          echo "--- All gradle.properties found ---"
          find "$GRADLE_USER_HOME" -name "gradle.properties" -exec echo "== {} ==" \; -exec cat {} \; 2>/dev/null || true
          echo "--- toolchains.xml ---"
          find "$HOME" -maxdepth 4 -name toolchains.xml -print -exec cat {} \; || true
